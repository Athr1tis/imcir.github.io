name: Update Visit Counts

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Project to update'
        required: false
        default: 'all'
      count:
        description: 'New count value'
        required: false
        default: '0'

  schedule:
    - cron: '0 * * * *'

  push:
    paths:
      - 'visitcounts'

jobs:
  update-counts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install axios

      - name: Update visitcounts file
        run: |
          node update-counts.js

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add visitcounts index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "🤖 Auto-update visit counts via GitHub Actions" && git push)

      - name: Show updated counts
        run: |
          echo "📊 Updated Visit Counts:"
          grep "speechy-pop" visitcounts || true
          grep "marketing-plan" visitcounts || true
          grep "crypto-bot" visitcounts || true
          grep "athlonix" visitcounts || true
          grep "analoghorror" visitcounts || true
          grep "n8n" visitcounts || true
          grep "make" visitcounts || true
          grep "graphics" visitcounts || true
          grep "ghl" visitcounts || true
